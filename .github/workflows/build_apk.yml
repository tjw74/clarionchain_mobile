name: Build & Release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "" | base64 -d > android/app/keystore.jks

      - name: Build APK
        run: flutter build apk --release
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: clarionchain2024
          KEY_ALIAS: clarionchain
          KEY_PASSWORD: clarionchain2024

      # Single clear filename for humans + correct Content-Type on Releases (no .bin rename)
      - name: Name APK for release
        run: cp build/app/outputs/flutter-apk/app-release.apk ClarionChain.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClarionChain-apk
          path: ClarionChain.apk
          retention-days: 14

      # Versioned release when you push a tag like v1.5.0
      - name: Create versioned GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ClarionChain.apk
          name: ClarionChain ${{ github.ref_name }}
          body: |
            ## ClarionChain ${{ github.ref_name }}

            Download **ClarionChain.apk** under Assets (normal filename — no rename).

      # Always-updated “Latest” install — one place to send people
      - name: Publish ClarionChain — Latest (main only)
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          artifacts: ClarionChain.apk
          tag: v1.4.0
          name: ClarionChain — Latest
          body: |
            **Install:** download **ClarionChain.apk** in Assets below (correct `.apk` name for Android).

            This release is updated automatically every time `main` is pushed.
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
